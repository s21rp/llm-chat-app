<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Habib AI</title>
        <style>
            :root {
                --primary-color: #f6821f;
                --primary-hover: #e67e22;
                --light-bg: #f9fafb;
                --border-color: #e5e7eb;
                --text-color: #1f2937;
                --text-light: #6b7280;
                --user-msg-bg: #fff2e6;
                --assistant-msg-bg: #ffffff;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.5;
                color: var(--text-color);
                background-color: #f3f4f6;
                /* dvh = dynamic viewport height. Handles mobile browser bars perfectly */
                height: 100dvh; 
                display: flex;
                flex-direction: column;
                overflow: hidden; /* Prevent body scroll */
            }

            .container {
                display: flex;
                flex-direction: column;
                height: 100%;
                max-width: 900px;
                width: 100%;
                margin: 0 auto;
                background-color: white;
                /* Shadow for larger screens */
                box-shadow: var(--shadow-md);
                position: relative;
            }

            /* --- Header --- */
            header {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                padding: 0.75rem;
                background-color: white;
                border-bottom: 1px solid var(--border-color);
                flex-shrink: 0; /* Prevent header from shrinking */
                z-index: 10;
            }

            h1 {
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--primary-color);
                letter-spacing: -0.5px;
            }

            h2 {
                font-size: 0.85rem;
                color: var(--text-light);
                font-weight: 400;
            }

            /* --- Chat Container --- */
            .chat-container {
                flex: 1;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                background-color: var(--light-bg);
                /* Smooth scroll for iOS */
                -webkit-overflow-scrolling: touch;
            }

            .chat-messages {
                padding: 1.5rem;
                display: flex;
                flex-direction: column;
                gap: 1rem;
                max-width: 800px;
                width: 100%;
                margin: 0 auto;
            }

            /* --- Messages --- */
            .message {
                display: flex;
                gap: 0.75rem;
                max-width: 90%;
                animation: fadeIn 0.3s ease-out;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .user-message {
                align-self: flex-end;
                flex-direction: row-reverse;
            }

            .assistant-message {
                align-self: flex-start;
            }

            /* Avatars */
            .avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.9rem;
                flex-shrink: 0;
                box-shadow: var(--shadow-sm);
            }

            .assistant-message .avatar {
                background-color: var(--primary-color);
                color: white;
            }

            .user-message .avatar {
                background-color: #e5e7eb;
                color: var(--text-color);
            }

            .message-content {
                padding: 0.85rem 1.1rem;
                border-radius: 18px;
                line-height: 1.5;
                font-size: 0.95rem;
                box-shadow: var(--shadow-sm);
            }

            .user-message .message-content {
                background-color: var(--primary-color);
                color: white;
                border-bottom-right-radius: 4px;
            }

            .assistant-message .message-content {
                background-color: white;
                border: 1px solid var(--border-color);
                border-bottom-left-radius: 4px;
            }

            .message-content p {
                white-space: pre-wrap;
                word-break: break-word;
            }

            /* --- Typing Indicator --- */
            .typing-indicator {
                display: none;
                padding: 0 1.5rem 1rem;
                align-self: flex-start;
                margin-left: 40px; /* Align with avatar */
            }

            .typing-indicator.visible {
                display: block;
            }

            .typing-dots {
                display: flex;
                gap: 4px;
                background: white;
                padding: 12px 16px;
                border-radius: 18px;
                border-bottom-left-radius: 4px;
                border: 1px solid var(--border-color);
            }

            .typing-dots span {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: #9ca3af;
                animation: bounce 1.4s infinite ease-in-out both;
            }

            .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
            .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

            @keyframes bounce {
                0%, 80%, 100% { transform: scale(0); }
                40% { transform: scale(1); }
            }

            /* --- Input Area --- */
            .message-input {
                display: flex;
                padding: 1rem;
                border-top: 1px solid var(--border-color);
                background-color: white;
                gap: 0.75rem;
                flex-shrink: 0; /* Prevent input from shrinking */
            }

            #user-input {
                flex: 1;
                padding: 0.75rem 1rem;
                border: 1px solid var(--border-color);
                border-radius: 24px;
                font-family: inherit;
                resize: none;
                font-size: 1rem;
                max-height: 120px; /* Limit growth on desktop */
                line-height: 1.4;
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            #user-input:focus {
                outline: none;
                border-color: var(--primary-color);
                box-shadow: 0 0 0 3px rgba(246, 130, 31, 0.15);
            }

            #send-button {
                width: 48px;
                height: 48px;
                background-color: var(--primary-color);
                color: white;
                border: none;
                border-radius: 50%;
                cursor: pointer;
                transition: all 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                box-shadow: var(--shadow-sm);
            }

            #send-button:hover {
                background-color: var(--primary-hover);
                transform: scale(1.05);
            }

            #send-button:active {
                transform: scale(0.95);
            }
            
            #send-button:disabled {
                background-color: #e5e7eb;
                cursor: not-allowed;
                transform: none;
                color: #9ca3af;
            }

            /* SVG Icon for button */
            .btn-icon {
                width: 24px;
                height: 24px;
                fill: currentColor;
            }

            /* --- Footer --- */
            footer {
                text-align: center;
                font-size: 0.75rem;
                color: var(--text-light);
                padding: 0.5rem;
                background: white;
                border-top: 1px solid var(--border-color);
                flex-shrink: 0;
            }

            /* --- Mobile Responsiveness --- */
            @media (max-width: 768px) {
                .container {
                    max-width: 100%;
                    border-radius: 0;
                }

                header {
                    padding: 0.5rem;
                    border-bottom: 1px solid var(--border-color);
                }

                h1 { font-size: 1.25rem; }
                h2 { display: none; } /* Hide subtitle on mobile for more space */

                .chat-messages {
                    padding: 1rem;
                    gap: 0.75rem;
                }

                .message {
                    max-width: 92%;
                }

                .avatar {
                    width: 28px;
                    height: 28px;
                    font-size: 0.8rem;
                }

                .message-content {
                    padding: 0.7rem 0.9rem;
                    font-size: 0.9rem;
                }

                .message-input {
                    padding: 0.75rem;
                    border-top: 1px solid var(--border-color);
                    /* Safe area for iOS devices with home bar */
                    padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); 
                }

                /* Input takes full width, button is circular icon */
                #user-input {
                    padding: 0.65rem 1rem;
                    border-radius: 20px;
                }
            }

            /* Scrollbar styling (Desktop) */
            .chat-container::-webkit-scrollbar {
                width: 6px;
            }

            .chat-container::-webkit-scrollbar-track {
                background: transparent;
            }

            .chat-container::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 10px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Habib AI</h1>
                <h2>Your Smart Assistant</h2>
            </header>

            <div class="chat-container" id="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="message assistant-message">
                        <div class="avatar">H</div>
                        <div class="message-content">
                            <p>Hello! I'm Habib, your AI Assistant. How can I help you today?</p>
                        </div>
                    </div>
                    <!-- User message example for styling reference
                    <div class="message user-message">
                        <div class="avatar">U</div>
                        <div class="message-content">
                            <p>Hi Habib!</p>
                        </div>
                    </div>
                    -->
                </div>

                <div class="typing-indicator" id="typing-indicator">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>

            <div class="message-input">
                <textarea
                    id="user-input"
                    placeholder="Type a message..."
                    rows="1"
                    autofocus
                ></textarea>
                <button id="send-button" aria-label="Send message">
                    <!-- Send Icon (Paper Plane) -->
                    <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>

            <footer>
                <p>Habib &copy; 2026</p>
            </footer>
        </div>

        <script src="chat.js"></script>
        <script>
            // Simple script to auto-resize textarea height
            const textarea = document.getElementById('user-input');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        </script>
    </body>
</html>
