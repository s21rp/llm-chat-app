<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Habib AI</title>

<style>

:root{
--primary:#f6821f;
--bg:#f5f6f8;
--assistant:#ffffff;
--user:#f6821f;
--text:#1f2937;
--border:#e5e7eb;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
padding:16px;
text-align:center;
background:linear-gradient(135deg,#f6821f,#ff9d4d);
color:white;
font-weight:600;
font-size:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* CHAT AREA */

.chat-container{
flex:1;
display:flex;
flex-direction:column;
max-width:900px;
width:100%;
margin:auto;
}

/* MESSAGES */

.chat-messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

/* MESSAGE */

.message{
display:flex;
gap:10px;
max-width:75%;
animation:fadeIn .2s ease;
}

.message p{
padding:12px 16px;
border-radius:16px;
line-height:1.4;
font-size:15px;
}

/* Assistant */

.assistant{
align-self:flex-start;
}

.assistant p{
background:var(--assistant);
border:1px solid var(--border);
}

/* User */

.user{
align-self:flex-end;
flex-direction:row-reverse;
}

.user p{
background:var(--user);
color:white;
}

/* Avatar */

.avatar{
width:34px;
height:34px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
flex-shrink:0;
}

/* INPUT AREA */

.input-area{
position:sticky;
bottom:0;
background:white;
border-top:1px solid var(--border);
padding:12px;
}

.input-box{
display:flex;
gap:10px;
max-width:900px;
margin:auto;
}

textarea{
flex:1;
border:1px solid var(--border);
border-radius:14px;
padding:12px;
font-size:15px;
resize:none;
max-height:120px;
outline:none;
}

textarea:focus{
border-color:var(--primary);
}

button{
background:var(--primary);
color:white;
border:none;
border-radius:12px;
padding:12px 18px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.9;
}

/* MOBILE */

@media (max-width:600px){

.chat-messages{
padding:14px;
}

.message{
max-width:90%;
}

textarea{
font-size:16px;
}

}

/* SCROLLBAR */

.chat-messages::-webkit-scrollbar{
width:6px;
}

.chat-messages::-webkit-scrollbar-thumb{
background:#d1d5db;
border-radius:6px;
}

/* ANIMATION */

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<header>
Habib AI
</header>

<div class="chat-container">

<div id="chat" class="chat-messages">

<div class="message assistant">
<div class="avatar">AI</div>
<p>Hello! I'm Habib AI. How can I help you today?</p>
</div>

</div>

</div>

<div class="input-area">

<div class="input-box">

<textarea id="input" placeholder="Ask anything..." rows="1"></textarea>

<button id="send">
Send
</button>

</div>

</div>

<script>

const textarea=document.getElementById("input");

textarea.addEventListener("input",()=>{
textarea.style.height="auto";
textarea.style.height=textarea.scrollHeight+"px";
});

</script>

</body>
</html>
